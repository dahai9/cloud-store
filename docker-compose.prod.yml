version: "3.8"

services:
  web-app:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: cloud_store_web_app
    command: ["web-app"]
    restart: unless-stopped
    ports:
      - "8081:8081" # 用户 API
      - "8082:8082" # 管理员 API
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env
    environment:
      - DATABASE_URL=sqlite:///app/data/cloud_store.db
      - APP_HOST=0.0.0.0
      - ADMIN_APP_HOST=0.0.0.0

  worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: cloud_store_worker
    command: ["worker"]
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env
    environment:
      - DATABASE_URL=sqlite:///app/data/cloud_store.db

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: cloud_store_frontend
    restart: unless-stopped
    ports:
      - "8080:8080" # 用户前台
      - "8083:8083" # 管理员后台
